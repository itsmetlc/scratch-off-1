<!DOCTYPE html>
<html>
<head>
  <title>Sparkle Creations Scratch-Off</title>
  <style>
    body {
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
    }

    .scratch-container {
      position: relative;
      width: 100%;
      max-width: 450px;
    }

    #ticketImage {
      width: 100%;
      display: block;
      border-radius: 20px;
    }

    #scratchCanvas {
      position: absolute;
      top: 0;
      left: 0;
      border-radius: 20px;
      cursor: pointer;
      touch-action: none;
    }
  </style>
</head>

<body>

<div class="scratch-container">
  <img id="ticketImage" src="ticket.png">
  <canvas id="scratchCanvas"></canvas>
</div>

<script>
const img = document.getElementById("ticketImage");
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");

function setupScratchLayer() {
  const width = img.clientWidth;
  const height = img.clientHeight;

  canvas.width = width;
  canvas.height = height;
  canvas.style.width = width + "px";
  canvas.style.height = height + "px";

  ctx.globalCompositeOperation = "source-over";

  ctx.fillStyle = "#b8b8b8";
  ctx.fillRect(0, 0, width, height);

  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 30px Arial";
  ctx.textAlign = "center";
  ctx.fillText("SCRATCH HERE", width / 2, height / 2);
}

img.onload = setupScratchLayer;

if (img.complete) {
  setupScratchLayer();
}

window.addEventListener("resize", setupScratchLayer);

let scratching = false;

function getPosition(e) {
  const rect = canvas.getBoundingClientRect();

  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }

  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function scratch(e) {
  if (!scratching) return;

  e.preventDefault();

  const pos = getPosition(e);

  ctx.globalCompositeOperation = "destination-out";
  ctx.beginPath();
  ctx.arc(pos.x, pos.y, 35, 0, Math.PI * 2);
  ctx.fill();
}

canvas.addEventListener("mousedown", function(e) {
  scratching = true;
  scratch(e);
});

canvas.addEventListener("mousemove", scratch);

canvas.addEventListener("mouseup", function() {
  scratching = false;
});

canvas.addEventListener("mouseleave", function() {
  scratching = false;
});

canvas.addEventListener("touchstart", function(e) {
  scratching = true;
  scratch(e);
});

canvas.addEventListener("touchmove", scratch);

canvas.addEventListener("touchend", function() {
  scratching = false;
});
</script>

</body>
</html>
